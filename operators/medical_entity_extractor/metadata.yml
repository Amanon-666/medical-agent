name: '医疗实体识别'
name_en: 'Medical Entity Extractor'
description: '使用离线医学词典/规则识别CMeEE 9类实体，可选LLM/Hybrid增强，并执行边界/类型校验'
description_en: 'Extracts CMeEE medical named entities with an offline baseline and optional LLM/Hybrid enhancement.'
language: 'python'
vendor: 'bjfuteam'
raw_id: 'MedicalEntityExtractor'
version: '1.0.0'
types: ['ner']
modal: 'text'
inputs: 'text'
outputs: 'text'
settings:
  backend:
    name: '抽取后端'
    type: 'select'
    defaultVal: 'offline'
    required: false
    options: ['offline', 'hybrid', 'llm']
  kgDbPath:
    name: '本地KG数据库路径（可选）'
    type: 'input'
    defaultVal: '/opt/runtime/ccf_medical_ai/data/task2_medical_kg.db'
    required: false
  ollamaUrl:
    name: 'LLM接口地址（hybrid/llm时使用）'
    type: 'input'
    defaultVal: 'https://api.deepseek.com/v1/chat/completions'
    required: false
  modelName:
    name: '模型名称'
    type: 'input'
    defaultVal: 'deepseek-chat'
    required: false
  timeoutSeconds:
    name: '超时时间（秒）'
    type: 'slider'
    defaultVal: 120
    min: 30
    max: 300
    step: 30
